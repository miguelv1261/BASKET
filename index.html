<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campeonato de Basket</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🏀 Campeonato de Basket</h1>
        <p>Tabla de posiciones y resultados oficiales</p>
    </header>

    <section class="podio-section">
        <h2>🏆 Top 3</h2>

        <div id="podio" class="podio">
        </div>
    </section>

    <section class="tabla-section">

        <h2>📊 Tabla de Posiciones</h2>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Equipo</th>
                        <th>PJ</th>
                        <th>PG</th>
                        <th>PP</th>
                        <th>PF</th>
                        <th>PC</th>
                        <th>DIF</th>
                        <th>PTS</th>
                    </tr>
                </thead>

                <tbody id="tabla-body">
                </tbody>
            </table>
        </div>

    </section>

    <section>

        <h2>🏀 Resultados</h2>

        <div id="resultados" class="resultados">
        </div>

    </section>

    <footer>
        Campeonato Basket © 2026
    </footer>

    <script src="script.js"></script>

</body>

</html>
