<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campeonato de Basket</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <header class="hero">

        <div class="hero-content">
            <h1 id="tituloCampeonato">
                🏀 Campeonato Masculino
            </h1>
            <p>Resultados, clasificación y próximos encuentros</p>
        </div>

    </header>
    <div class="tabs">

        <button class="tab active" onclick="cambiarCategoria('masculino', this)">
            Masculino
        </button>

        <button class="tab" onclick="cambiarCategoria('femenino', this)">
            Femenino
        </button>

    </div>
    <section class="podio-section">

        <h2>🏆 Top 3</h2>

        <div id="podio" class="podio"></div>

    </section>

    <section>

        <h2>📊 Tabla de Posiciones</h2>

        <div class="table-container">

            <table>

                <thead>

                    <tr>
                        <th>#</th>
                        <th>Equipo</th>
                        <th>PJ</th>
                        <th>PG</th>
                        <th>PP</th>
                        <th>PF</th>
                        <th>PC</th>
                        <th>DIF</th>
                        <th>PTS</th>
                    </tr>

                </thead>

                <tbody id="tabla-body"></tbody>

            </table>

        </div>

    </section>

    <section>

        <h2>📅 Próximos Partidos</h2>

        <div id="proximosPartidos" class="proximos-grid"></div>

    </section>

    <section>

        <h2>🏀 Resultados</h2>

        <div id="resultados" class="resultados-grid"></div>

    </section>

    <footer>
        Campeonato Basket © 2026
    </footer>

    <script src="script.js"></script>

</body>

</html>
